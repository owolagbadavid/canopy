<svg xmlns="http://www.w3.org/2000/svg" width="480" height="360" viewBox="0 0 480 360">
  <rect width="480" height="360" fill="#cfd6c9"/>
  <rect width="480" height="360" fill="url(#g)" opacity="0.25"/>
  <defs>
    <radialGradient id="g" cx="50%" cy="40%"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#7d8a72"/></radialGradient>
  </defs>
  <g fill="#5f7050">
    <g>
      <circle cx="60" cy="60" r="20"/><circle cx="130" cy="60" r="21"/><circle cx="200" cy="60" r="19"/><circle cx="270" cy="60" r="22"/><circle cx="340" cy="60" r="20"/><circle cx="410" cy="60" r="21"/>
      <circle cx="60" cy="130" r="21"/><circle cx="130" cy="130" r="22"/><circle cx="200" cy="130" r="20"/><circle cx="270" cy="130" r="21"/><circle cx="340" cy="130" r="19"/><circle cx="410" cy="130" r="22"/>
      <circle cx="60" cy="200" r="20"/><circle cx="130" cy="200" r="19"/><circle cx="200" cy="200" r="22"/><circle cx="270" cy="200" r="20"/><circle cx="340" cy="200" r="21"/><circle cx="410" cy="200" r="20"/>
      <circle cx="60" cy="270" r="19"/><circle cx="130" cy="270" r="21"/><circle cx="200" cy="270" r="20"/><circle cx="270" cy="270" r="18"/><circle cx="340" cy="270" r="20"/><circle cx="410" cy="270" r="19"/>
    </g>
  </g>
  <!-- CV detection overlay: green = healthy, dashed = stressed, red = gap -->
  <g fill="none" stroke-width="2">
    <g stroke="#000">
      <rect x="40" y="40" width="40" height="40"/><rect x="110" y="40" width="40" height="40"/><rect x="180" y="40" width="40" height="40"/><rect x="250" y="40" width="40" height="40"/><rect x="320" y="40" width="40" height="40"/><rect x="390" y="40" width="40" height="40"/>
      <rect x="40" y="110" width="40" height="40"/><rect x="110" y="110" width="40" height="40"/><rect x="180" y="110" width="40" height="40"/><rect x="250" y="110" width="40" height="40"/><rect x="320" y="110" width="40" height="40"/><rect x="390" y="110" width="40" height="40"/>
      <rect x="40" y="180" width="40" height="40"/><rect x="110" y="180" width="40" height="40"/><rect x="180" y="180" width="40" height="40"/><rect x="250" y="180" width="40" height="40"/><rect x="320" y="180" width="40" height="40"/><rect x="390" y="180" width="40" height="40"/>
      <rect x="40" y="250" width="40" height="40"/><rect x="110" y="250" width="40" height="40"/><rect x="180" y="250" width="40" height="40"/>
    </g>
    <!-- stressed -->
    <rect x="250" y="250" width="40" height="40" stroke="#000" stroke-dasharray="4 3"/>
    <!-- gap / replacement -->
    <rect x="320" y="250" width="40" height="40" stroke="#000" stroke-width="3"/>
    <line x1="320" y1="250" x2="360" y2="290" stroke="#000" stroke-width="3"/>
    <line x1="360" y1="250" x2="320" y2="290" stroke="#000" stroke-width="3"/>
    <rect x="390" y="250" width="40" height="40" stroke="#000"/>
  </g>
  <rect x="0" y="0" width="172" height="22" fill="#000"/>
  <text x="8" y="16" font-family="monospace" font-size="12" fill="#fff">184 crowns · 63% canopy</text>
</svg>
