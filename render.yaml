services:
  - type: web
    name: canopy
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: WEATHER_AI_KEY
        sync: false
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: CACHE_DRIVER
        value: memory
      - key: REDIS_URL
        sync: false
